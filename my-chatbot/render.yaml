# Blueprint for Render.com — with rootDir set, staticPublishPath is relative to that
# root (see Render "Monorepo Support"). Leave the dashboard Root Directory empty at repo
# level unless you use a subfolder; see ../DEPLOY.md
#
# - Vite bakes VITE_API_URL at static build: we pull the API service RENDER_EXTERNAL_URL
#   so the live site calls your API (and Postgres) instead of localhost.
# - The API does not need the static URL in CORS: config/settings.py allows
#   https://*.onrender.com when RENDER is set (CORS_TRUST_ONRENDER, default on).
# - ALLOWED_HOSTS includes the hostname from RENDER_EXTERNAL_URL on the API service.
services:
  - type: web
    name: reading-chatbot-api
    runtime: python
    plan: free
    rootDir: my-chatbot/backend
    buildCommand: pip install -r requirements.txt && python manage.py migrate --noinput && python manage.py collectstatic --noinput
    startCommand: gunicorn config.wsgi:application --bind 0.0.0.0:$PORT
    envVars:
      - key: PYTHON_VERSION
        value: "3.13.0"
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: "False"
      - key: OPENAI_API_KEY
        sync: false
      - key: DATABASE_URL
        fromDatabase:
          name: reading-chatbot-db
          property: connectionString
      - key: DATABASE_SSL_REQUIRE
        value: "true"

  - type: web
    name: reading-chatbot-frontend
    runtime: static
    rootDir: my-chatbot
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    envVars:
      - key: VITE_API_URL
        fromService:
          name: reading-chatbot-api
          type: web
          envVarKey: RENDER_EXTERNAL_URL

databases:
  - name: reading-chatbot-db
    plan: free
    databaseName: reading_chatbot
    user: reading_chatbot_user
