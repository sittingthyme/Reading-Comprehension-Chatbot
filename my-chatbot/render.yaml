# Blueprint for Render.com — paths are relative to the Git repository root (Reading-Comprehension-Chatbot).
# Leave the Render dashboard "Root Directory" empty unless you use a monorepo subfolder as root;
# if you set Root Directory to `my-chatbot`, use rootDir `backend` / `.` and staticPublishPath `./dist`.
services:
  - type: web
    name: reading-chatbot-api
    runtime: python
    plan: free
    rootDir: my-chatbot/backend
    buildCommand: pip install -r requirements.txt && python manage.py collectstatic --noinput && python manage.py migrate --noinput
    startCommand: gunicorn config.wsgi:application --bind 0.0.0.0:$PORT
    envVars:
      - key: PYTHON_VERSION
        value: "3.13.0"
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: "False"
      - key: OPENAI_API_KEY
        sync: false
      - key: DATABASE_URL
        fromDatabase:
          name: reading-chatbot-db
          property: connectionString
      - key: ALLOWED_HOSTS
        sync: false
      - key: CORS_ALLOWED_ORIGINS
        sync: false
      - key: CSRF_TRUSTED_ORIGINS
        sync: false

  # Static sites: omit `plan` — Render does not accept `plan: free` for runtime: static (type web).
  - type: web
    name: reading-chatbot-frontend
    runtime: static
    rootDir: my-chatbot
    buildCommand: npm install && npm run build
    # Publish path is relative to the repository root (not rootDir); build writes to my-chatbot/dist.
    staticPublishPath: my-chatbot/dist
    envVars:
      - key: VITE_API_URL
        sync: false

databases:
  - name: reading-chatbot-db
    plan: free
    databaseName: reading_chatbot
    user: reading_chatbot_user
