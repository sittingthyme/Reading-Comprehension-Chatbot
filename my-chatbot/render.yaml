services:
  # Backend Django API
  - type: web
    name: reading-chatbot-api
    env: python
    plan: free
    buildCommand: cd backend && pip install -r requirements.txt && python manage.py collectstatic --noinput && python manage.py migrate --noinput
    startCommand: cd backend && gunicorn config.wsgi:application --bind 0.0.0.0:$PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.13.0
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: False
      - key: OPENAI_API_KEY
        sync: false  # Set this in Render dashboard
      - key: DATABASE_URL
        fromDatabase:
          name: reading-chatbot-db
          property: connectionString
      - key: ALLOWED_HOSTS
        sync: false  # Will be set to your Render service URL
      - key: CORS_ALLOWED_ORIGINS
        sync: false  # Will be set to your frontend URL
      - key: CSRF_TRUSTED_ORIGINS
        sync: false  # Will be set to your frontend URL

  # PostgreSQL Database
  - type: pspg
    name: reading-chatbot-db
    plan: free
    databaseName: reading_chatbot
    databaseUser: reading_chatbot_user

  # Frontend (Static Site)
  - type: web
    name: reading-chatbot-frontend
    env: static
    buildCommand: npm install && npm run build
    staticPublishPath: ./dist
    envVars:
      - key: VITE_API_URL
        sync: false  # Set to your backend API URL
